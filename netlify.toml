[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api/* to Vercel (the working production deployment).
# This means the SPA build is served by Netlify (CDN edge) and
# API calls are routed to Vercel where the serverless functions live.
[[redirects]]
  from = "/api/*"
  to = "https://freshpeople-app.vercel.app/api/:splat"
  status = 200
  force = true

# SPA fallback for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
