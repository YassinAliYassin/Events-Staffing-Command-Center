services:
  - type: web
    name: escc-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: escc-db
          property: connectionString
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_WABA_ID
        sync: false
      - key: ICLOUD_CALENDAR_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: fresh_people_verify_token

databases:
  - name: escc-db
    plan: free
