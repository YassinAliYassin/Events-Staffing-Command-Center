services:
  - type: web
    name: fpcc-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: fpcc-db
          property: connectionString
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_WABA_ID
        sync: false
      - key: ICLOUD_CALENDAR_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: fresh_people_verify_token
      # Auth hardening (see SECURITY.md)
      - key: FPCC_ADMIN_PASSWORD
        sync: false
      - key: FPCC_JWT_SECRET
        sync: false
      # Or reuse JWT_SECRET if set globally for both projects

databases:
  - name: fpcc-db
    plan: free
